name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  uv-workspace:
    name: uv workspace (lock + sync + import smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - name: Verify lockfile is in sync with pyproject.toml
        run: uv lock --check
      - name: Install workspace from frozen lockfile
        # Skip the torch CUDA index on the CI runner (~1 GB nvidia wheels,
        # not exercised here). The dflash/pflash workspace members still
        # resolve; megakernel needs nvcc and is exercised by the CUDA job.
        run: uv sync --frozen --no-install-package torch
      - name: Import smoke (server.py + workspace modules)
        run: |
          uv run --frozen --no-sync python -c "
          import fastapi, uvicorn, transformers, jinja2, numpy, gguf, datasets, huggingface_hub
          import sys; sys.path.insert(0, 'dflash/scripts')
          import server  # noqa: F401
          print('workspace OK')
          "

  build:
    name: Build (CUDA 12.8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: network
          sub-packages: '["nvcc", "cudart-dev", "thrust", "driver-dev"]'
          non-cuda-sub-packages: '["libcublas-dev"]'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build dflash
        run: |
          cd dflash
          cmake -B build \
            -DCMAKE_CUDA_ARCHITECTURES="75;86" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Install megakernel Python deps
        run: pip install torch --index-url https://download.pytorch.org/whl/cu126

      - name: Build megakernel (sm_75)
        env:
          CUDA_HOME: ${{ env.CUDA_PATH }}
        run: |
          cd megakernel
          MEGAKERNEL_CUDA_ARCH=sm_75 python3 setup.py build_ext --inplace
          rm -rf build

      - name: Build megakernel (sm_86)
        env:
          CUDA_HOME: ${{ env.CUDA_PATH }}
        run: |
          cd megakernel
          MEGAKERNEL_CUDA_ARCH=sm_86 python3 setup.py build_ext --inplace
